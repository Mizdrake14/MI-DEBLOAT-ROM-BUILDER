name: Build Debloated HyperOS ROM

on:
  workflow_dispatch:
    inputs:
      rom_url:
        description: "Direct ROM link"
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - name: 📂 Checkout
        uses: actions/checkout@v4

      - name: ⏱ Start Timer
        run: echo "BUILD_START=$(date +%s)" >> $GITHUB_ENV

      - name: 📥 Dependencies
        run: |
          set -euo pipefail
          {
            export DEBIAN_FRONTEND=noninteractive
            sudo apt update
            sudo apt install -y wget tar gzip pigz unzip \
              android-sdk-libsparse-utils e2fsprogs lz4 python3 \
              erofs-utils aria2 file sed coreutils attr util-linux
            sudo apt-get clean
            sudo rm -rf /var/lib/apt/lists/*
          } 2>&1 | tee -a build.log

      - name: 🛠️ Setup Android Tools
        run: |
          set -euo pipefail
          {
            mkdir -p bin
            wget https://dl.google.com/android/repository/platform-tools-latest-linux.zip -O pt.zip
            unzip -q pt.zip
            
            FIND_E2=$(find . -name e2fsdroid -type f | head -n1)
            FIND_MK=$(find . -name mke2fs -type f | head -n1)
            [ -n "$FIND_E2" ] && cp "$FIND_E2" bin/e2fsdroid
            [ -n "$FIND_MK" ] && cp "$FIND_MK" bin/mke2fs
            
            wget https://github.com/ravindu644/android-lptools-static-x86_64/raw/main/lpmake -O bin/lpmake
            wget https://github.com/ravindu644/android-lptools-static-x86_64/raw/main/lpunpack -O bin/lpunpack
            
            rm -rf platform-tools pt.zip
            chmod +x bin/*
            sudo mv bin/* /usr/local/bin/
            
            command -v e2fsdroid >/dev/null || exit 1
            command -v lpunpack >/dev/null || exit 1
          } 2>&1 | tee -a build.log

      - name: 📥 Download ROM
        run: |
          set -euo pipefail
          {
            URL_RAW=$(basename "${{ github.event.inputs.rom_url }}" | cut -d'?' -f1)
            SAFE_NAME=$(echo "$URL_RAW" | sed 's/[^a-zA-Z0-9._-]/-/g' | cut -c1-60)
            echo "ORIGINAL_FILENAME=$SAFE_NAME" >> $GITHUB_ENV
            aria2c -x 16 -s 16 -k 1M --max-tries=5 --timeout=60 --retry-wait=5 --file-allocation=none -o rom_archive.tgz "${{ github.event.inputs.rom_url }}"
          } 2>&1 | tee -a build.log

      - name: 📦 Extract ROM
        run: |
          set -euo pipefail
          {
            tar -xvzf rom_archive.tgz || tar -xvf rom_archive.tgz
            ROM_DIR=$(find . -type f -name "super.img" | head -n1 | sed 's|/images/super.img||;s|/super.img||')
            [ -z "$ROM_DIR" ] && exit 1
            echo "ROM_DIR=$ROM_DIR" >> $GITHUB_ENV
          } 2>&1 | tee -a build.log

      - name: 📂 Unpack Super
        run: |
          set -euo pipefail
          {
            cd "${{ env.ROM_DIR }}/images"
            if file super.img | grep -q "sparse"; then simg2img super.img super_raw.img; else cp super.img super_raw.img; fi
            rm -rf super_extracted && mkdir super_extracted
            lpunpack super_raw.img super_extracted/ || exit 1
            echo "SUPER_RAW_SIZE=$(stat -c%s super_raw.img)" >> $GITHUB_ENV
          } 2>&1 | tee -a build.log

      - name: 📤 Throttled Extraction
        run: |
          set -euo pipefail
          {
            cd "${{ env.ROM_DIR }}/images"
            ACTIVE_PARTS=""
            for img in super_extracted/*.img; do
              part=$(basename "$img" | sed 's/_a.img//;s/.img//')
              [[ "$part" =~ ^(system|product|system_ext|vendor|odm|vendor_dlkm|system_dlkm)$ ]] || continue
              ACTIVE_PARTS="$ACTIVE_PARTS $part"
            done
            [ -n "$ACTIVE_PARTS" ] || exit 1
            echo "ACTIVE_PARTS=$ACTIVE_PARTS" >> $GITHUB_ENV

            MAX_JOBS=2
            set -m
            FAIL=0
            for part in $ACTIVE_PARTS; do
              (
                IMG="super_extracted/${part}_a.img"
                [ -f "$IMG" ] || IMG="super_extracted/${part}.img"
                mkdir -p "$part" "mnt_$part"
                LOOP=$(sudo losetup -f --show "$IMG")
                sudo blkid "$LOOP" | grep -q 'TYPE="erofs"' && FT="erofs" || FT="ext4"
                sudo mount -t $FT "$LOOP" "mnt_$part" || exit 1
                sudo cp -a "mnt_$part"/. "$part"/
                sudo umount -l "mnt_$part"
                sudo losetup -d "$LOOP"
                [ "$(ls -A "$part")" ] || exit 1
              ) || FAIL=1 &
              while [ "$(jobs -r | wc -l)" -ge "$MAX_JOBS" ]; do sleep 1; done
            done
            wait
            [ "$FAIL" -eq 0 ] || exit 1
          } 2>&1 | tee -a build.log

      - name: 🧹 Debloat
        run: |
          set -euo pipefail
          {
            cd "${{ env.ROM_DIR }}/images"
            if [ -f ../../debloat.sh ]; then
              chmod +x ../../debloat.sh
              bash ../../debloat.sh
              [ -d "system/app" ] || exit 1
            fi
          } 2>&1 | tee -a build.log

      - name: 📏 Calculate Sizes
        run: |
          set -euo pipefail
          {
            cd "${{ env.ROM_DIR }}/images"
            TOTAL_BYTES=0
            for part in ${{ env.ACTIVE_PARTS }}; do
              ORIG_IMG="super_extracted/${part}_a.img"
              [ -f "$ORIG_IMG" ] || ORIG_IMG="super_extracted/${part}.img"
              LOOP=$(sudo losetup -f --show "$ORIG_IMG")
              sudo blkid "$LOOP" | grep -q 'TYPE="erofs"' && FS="erofs" || FS="ext4"
              sudo losetup -d "$LOOP"
              SIZE_MB=$(sudo du -sm "$part" | cut -f1)
              SIZE_MB=$((SIZE_MB + 150))
              BYTES=$((SIZE_MB * 1024 * 1024))
              echo "${part^^}_FS=$FS" >> $GITHUB_ENV
              echo "${part^^}_BYTES=$BYTES" >> $GITHUB_ENV
              echo "${part^^}_MB=$SIZE_MB" >> $GITHUB_ENV
              TOTAL_BYTES=$((TOTAL_BYTES + BYTES))
            done
            OFFSET=$((64 * 1024 * 1024))
            MAX_SIZE=$((${{ env.SUPER_RAW_SIZE }} - $OFFSET))
            BUFFER=$((TOTAL_BYTES / 10))
            [ "$BUFFER" -lt 268435456 ] && BUFFER=268435456
            FINAL_CALC=$((TOTAL_BYTES + BUFFER))
            [ "$FINAL_CALC" -gt "$MAX_SIZE" ] && SUPER_FINAL=$MAX_SIZE || SUPER_FINAL=$FINAL_CALC
            echo "SUPER_FINAL=$SUPER_FINAL" >> $GITHUB_ENV
          } 2>&1 | tee -a build.log

      - name: 🧱 Build Filesystems
        run: |
          set -euo pipefail
          {
            cd "${{ env.ROM_DIR }}/images"
            MAX_JOBS=2
            FAIL=0
            for part in ${{ env.ACTIVE_PARTS }}; do
              (
                FS_VAR=${part^^}_FS
                SIZE_MB_VAR=${part^^}_MB
                if [ "${!FS_VAR}" = "ext4" ]; then
                  truncate -s ${!SIZE_MB_VAR}M "${part}_new.img"
                  sudo mke2fs -t ext4 -L "$part" -M "/$part" -O ^has_journal "${part}_new.img"
                  sudo e2fsdroid -e -a "/$part" -f "$part" "${part}_new.img"
                else
                  sudo mkfs.erofs -zlz4hc "${part}_new.img" "$part"
                fi
                img2simg "${part}_new.img" "${part}_sparse.img"
                mv "${part}_sparse.img" "${part}_new.img"
              ) || FAIL=1 &
              while [ "$(jobs -r | wc -l)" -ge "$MAX_JOBS" ]; do sleep 1; done
            done
            wait
            [ "$FAIL" -eq 0 ] || exit 1
          } 2>&1 | tee -a build.log

      - name: 🧱 Build Super Image
        run: |
          set -euo pipefail
          {
            cd "${{ env.ROM_DIR }}/images"
            LP_ARGS="--metadata-size 65536 --metadata-slots 2 --super-name super --device super:${{ env.SUPER_FINAL }} --group main:${{ env.SUPER_FINAL }} --alignment 4096 --sparse"
            for part in ${{ env.ACTIVE_PARTS }}; do
              BYTES_VAR=${part^^}_BYTES
              LP_ARGS="$LP_ARGS --partition ${part}_a:readonly:${!BYTES_VAR}:main --image ${part}_a=${part}_new.img --partition ${part}_b:readonly:0:main"
            done
            lpmake $LP_ARGS --output super_final.img
            mv super_final.img super.img
          } 2>&1 | tee -a build.log

      - name: 📦 Pack & Checksum
        run: |
          set -euo pipefail
          {
            cd "${{ env.ROM_DIR }}/images"
            sudo rm -rf super_raw.img super_extracted system product system_ext vendor odm vendor_dlkm system_dlkm *_new.img mnt_* 2>/dev/null || true
            cd ../..
            DATE_STAMP=$(date +%Y%m%d)
            FINAL_NAME="Debloated_${{ env.ORIGINAL_FILENAME }}_${DATE_STAMP}.tgz"
            echo "FINAL_NAME=$FINAL_NAME" >> $GITHUB_ENV
            tar -I 'pigz -9' -cvf "$FINAL_NAME" "${{ env.ROM_DIR }}"
            sha256sum "$FINAL_NAME" > "${FINAL_NAME}.sha256"
          } 2>&1 | tee -a build.log

      - name: 📤 Upload
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ env.ORIGINAL_FILENAME }}_debloated
          path: |
            *.tgz
            *.sha256
            build.log
